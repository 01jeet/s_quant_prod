services:
  # --- INFRA SERVICES ---
  valkey:
    image: valkey/valkey:7.2 # Pinned to stable 7.2
    container_name: valkey
    restart: always
    sysctls:
      net.core.somaxconn: 1024
    command: >
      valkey-server --port 6379 --requirepass ${VALKEY_PASSWORD} --appendonly yes --save "" --timeout 60 --maxclients 1000 --tcp-backlog 511
    volumes:
      - valkey_data:/data
    ports:
      - "${VALKEY_PORT}:6379"
    networks:
      - infra-network
    environment:
      TZ: ${TZ}
    healthcheck:
      # Fixed: Added password to the healthcheck command
      test: [ "CMD-SHELL", "valkey-cli -a ${VALKEY_PASSWORD} ping | grep PONG" ]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
      start_period: ${HEALTHCHECK_START_PERIOD}

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    restart: always
    depends_on:
      valkey:
        condition: service_healthy
    environment:
      - REDIS_HOST=valkey
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${VALKEY_PASSWORD}
    ports:
      - "${REDIS_COMMANDER_PORT}:8081"
    networks:
      - infra-network
    healthcheck:
      test: [ "CMD", "node", "/redis-commander/bin/healthcheck.js" ]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
      start_period: ${HEALTHCHECK_START_PERIOD}

  nats:
    image: nats:2.10-alpine # Pinned to a stable alpine version (Your log: 2.14.2)
    container_name: nats
    restart: always
    command: >
      -js -store_dir /data -user ${NATS_USER} -pass ${NATS_PASSWORD} -m 8222
    volumes:
      - nats_data:/data
    ports:
      - "${NATS_PORT}:4222"
      - "${NATS_UIPORT}:8222"
    networks:
      - infra-network
    environment:
      TZ: ${TZ}
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "4222" ]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
      start_period: ${HEALTHCHECK_START_PERIOD}

  centrifugo:
    image: centrifugo/centrifugo:v6 # Pinned to v6 (Your log: 6.8.2)
    container_name: centrifugo
    restart: always
    depends_on:
      valkey:
        condition: service_healthy
    volumes:
      - ${CENTRIFUGO_CONFIG_PATH}:/centrifugo_config/centrifugo_config.json
    environment:
      - TZ=${TZ}
    command: centrifugo -c /centrifugo_config/centrifugo_config.json
    ports:
      - "${CENTRIFUGO_PORT}:8000"
    networks:
      - infra-network
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8000 || exit 1" ]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
      start_period: ${HEALTHCHECK_START_PERIOD}

  pgadmin:
    image: dpage/pgadmin4:9.15
    container_name: pgadmin
    restart: always
    depends_on:
      infra-postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ${PGADMIN_SERVER_CONFIG_PATH}:/pgadmin4/servers.json
    networks:
      - infra-network
    healthcheck:
      # test: [ "CMD-SHELL", "wget -qO- http://localhost:80/misc/ping || exit 1" ]
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/misc/ping" ]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
      start_period: ${HEALTHCHECK_START_PERIOD}

  infra-postgres:
    image: postgres:16-alpine # Pinned to 16 (Stable Prod)
    container_name: infra-postgres
    restart: always
    ports:
      - "${INFRA_POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${INFRA_POSTGRES_USER}
      POSTGRES_PASSWORD: ${INFRA_POSTGRES_PASSWORD}
      POSTGRES_DB: ${INFRA_POSTGRES_DB}
    volumes:
      - infra_postgres_data:/var/lib/postgresql
    networks:
      - infra-network
    healthcheck:
      # test: [ "CMD-SHELL", "pg_isready -U ${INFRA_POSTGRES_USER}" ]
      test: [ "CMD-SHELL", "pg_isready -U ${INFRA_POSTGRES_USER} -d ${INFRA_POSTGRES_DB}" ]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
      start_period: ${HEALTHCHECK_START_PERIOD}

  clickhouse:
    image: clickhouse/clickhouse-server:24.8 # Pinned to a stable release
    container_name: clickhouse
    restart: always
    ports:
      - "${CLICKHOUSE_PORT}:8123"
      - "${CLICKHOUSE_PORT_UI}:9000"
      - "13133:13133" # Dedicated Health Check Port
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    networks:
      - infra-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep Ok || exit 1" ]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
      start_period: ${HEALTHCHECK_START_PERIOD}

  flower:
    image: mher/flower:latest # Flower is a tool, latest is usually fine
    container_name: flower
    restart: always
    depends_on:
      valkey:
        condition: service_healthy
    ports:
      - "${FLOWER_PORT}:5555"
    environment:
      TZ: ${TZ}
    command:
      - celery
      - --broker=redis://:${VALKEY_PASSWORD}@valkey:6379/0
      - flower
      - --port=5555
    networks:
      - infra-network

volumes:
  valkey_data:
  nats_data:
  pgadmin_data:
  infra_postgres_data:
  clickhouse_data:
  clickhouse_logs:
  postgres-data:

networks:
  infra-network:
    driver: bridge
  # temporal-network:
  #   driver: bridge
